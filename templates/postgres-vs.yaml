---
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: postgres-vs
spec:
  exportTo:
    - .
  gateways:
    - postgres-gateway
    - mesh
  hosts:
    - {{ .Values.external.postgres.host }}
  tcp:
    - match:
        - gateways:
            - mesh
          port: {{ .Values.external.postgres.port }}
      route:
        - destination:
            host: egressgateway-postgres
            port:
              number: 5000
            subset: postgres-internal
    - match:
        - gateways:
            - postgres-gateway
          port: 5000
      route:
        - destination:
            host: {{ .Values.external.postgres.host }}
            port:
              number: {{ .Values.external.postgres.port }}
            subset: tcp-passthrough-postgres
