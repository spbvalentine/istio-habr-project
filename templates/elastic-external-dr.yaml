---
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: elastic-external-dr
spec:
  exportTo:
    - .
  host: {{ .Values.external.elastic.host }}
  subsets:
    - name: tls-origination-elastic
      trafficPolicy:
        loadBalancer:
          simple: ROUND_ROBIN
        portLevelSettings:
          - port:
              number: {{ .Values.external.elastic.port }}
            tls:
              caCertificates: /secrets/istio/egressgateway-ca-certs/ca.crt
              clientCertificate: /secrets/istio/egressgateway-certs/tls.crt
              mode: SIMPLE
              privateKey: /secrets/istio/egressgateway-certs/tls.key
              sni: {{ .Values.external.elastic.host }}
  workloadSelector:
    matchLabels:
      app: egressgateway
