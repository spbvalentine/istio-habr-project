---
kind: Secret
apiVersion: v1
metadata:
  name: postgres-cert
data:
  tls.crt: |-
    {{ index .Values.certs.postgres "tls.crt" | nindent 4 }}
  tls.key: |-
    {{ index .Values.certs.postgres "tls.key" | nindent 4 }}
  ca.crt: |-
    {{ index .Values.certs.postgres "ca.crt" | nindent 4 }}
type: Opaque